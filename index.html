<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Gaston Command</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root { --red: #ff3333; --blue: #3b82f6; --bg: #050505; --card: #121212; --text: #ffffff; --muted: #8a8a8a; --green: #00ffcc; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
    .setup-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 20px; background: var(--bg); z-index: 999; }
    .setup-box { border: 1px solid #333; padding: 24px; border-radius: 12px; background: #1e1e1e; width: 100%; max-width: 420px; text-align: center; }
    .setup-box input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #333; background: #000; color: #fff; margin: 8px 0; }
    .btn { width: 100%; padding: 14px; border-radius: 6px; border: none; font-weight: 700; text-transform: uppercase; margin-top: 10px; cursor: pointer; }
    .btn-green { background: var(--green); color: #000; }
    .btn-blue { background: var(--blue); color: #fff; }
    .header { padding: 40px 20px 20px; border-bottom: 1px solid #333; margin-bottom: 20px; }
    .header h1 { margin: 0; font-size: 20px; color: var(--blue); }
    main { padding: 0 20px 20px; display: grid; gap: 12px; grid-template-columns: 1fr; }
    .module { border: 1px solid var(--muted); border-radius: 12px; padding: 18px; background: rgba(0,0,0,0.02); }
    .label-title { font-size: 12px; text-transform: uppercase; color: #94a3b8; font-weight: 700; margin-bottom: 8px; display:block; }
    .row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin-bottom: 8px; color: #cbd5e1; }
    @media (min-width: 720px) { main { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <aside id="setup-screen" class="setup-screen">
    <div class="setup-box">
      <h2 style="color:var(--green); font-size:16px; margin-bottom:5px;">SYSTEM UNINITIALIZED</h2>
      <p style="color:#888; font-size:11px; margin-bottom:20px;">Enter operator details to permanently bind this device.</p>
      <form id="setup-form" autocomplete="off">
        <input type="text" id="owner-name" placeholder="OPERATOR NAME" required />
        <input type="text" id="firm-name" placeholder="COMMAND ALIAS (FIRM)" required />
        <button type="submit" class="btn btn-green">BURN INITIAL PROFILE</button>
      </form>
    </div>
  </aside>
  <header class="header" id="header" style="display:none;">
    <h1>GASTON COMMAND</h1>
    <p style="font-size:11px; color:var(--muted); margin-top:6px;">REGISTRY • PENTAGON-PLUS</p>
  </header>
  <main id="main-dashboard" style="display:none;">
    <section class="module">
      <h2 class="label-title">MARKETING SUITE</h2>
      <div class="row"><span>Lead Scraper:</span><span id="scraper-status" style="color:var(--green);">IDLE</span></div>
      <div class="row"><span>Video Studio:</span><span id="video-status" style="color:#ffcc00;">STANDBY</span></div>
      <div style="height:4px; background:#222; border-radius:2px; margin:10px 0; overflow:hidden;">
        <div id="video-progress" style="height:100%; width:0%; background:var(--blue); transition:width 2s;"></div>
      </div>
      <button class="btn btn-blue" onclick="triggerCampaign()">START NEW CAMPAIGN</button>
    </section>
    <section class="module">
      <h2 class="label-title">ASSETS & CONTROL</h2>
      <div class="row"><span>Operator:</span><span id="header-owner" style="color:#fff;">--</span></div>
      <div class="row"><span>Firm:</span><span id="header-firm" style="color:#fff;">--</span></div>
      <button class="btn btn-green" onclick="prepareActivation('Watertown Surgical')">ACTIVATE CLIENT</button>
    </section>
  </main>
  <div id="toast" style="position:fixed; bottom:16px; left:50%; transform:translateX(-50%); display:none; background:#111; color:#fff; padding:12px 16px; border-radius:8px; z-index:9999; font-size:13px;"></div>
  <script src="scripts/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js'); });
    }
  </script>
</body>
</html>
